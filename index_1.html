<!DOCTYPE html>
<html>
<head>
  <title>JS Functions, Loops & Objects</title>
</head>
<body>

  <h2>JavaScript Functions, Loops & Objects Demo</h2>

  <button onclick="showNumbers()">Show Numbers (Loop)</button>
  <button onclick="showStudent()">Show Object</button>
  <button onclick="showDate()">Show Date</button>
  <button onclick="showArray()">Show Array Loop</button>

  <h3 id="output"></h3>

  <script>
    function showNumbers() {
      let result = "";
      for (let i = 1; i <= 10; i++) {
        result += i + " ";
      }
      document.getElementById("output").innerText = result;
    }

    function showStudent() {
      let student = {
        name: "Venkateswarlu",
        age: 21,
        course: "CSE"
      };

      document.getElementById("output").innerText =
        "Name: " + student.name +
        ", Age: " + student.age +
        ", Course: " + student.course;
    }

    function showDate() {
      let today = new Date();
      document.getElementById("output").innerText =
        "Current Date & Time: " + today;
    }

    function showArray() {
      let fruits = ["Apple", "Banana", "Mango"];
      let result = "";

      fruits.forEach(function(item) {
        result += item + " ";
      });

      document.getElementById("output").innerText = result;
    }

  </script>

</body>
</html>
