<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Practice Page</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
        }
        .box {
            border: 2px solid black;
            padding: 10px;
            margin: 10px;
        }
    </style>
</head>

<body>
    
    <h1>Welcome to HTML Page</h1>
    <h2>Sub Heading</h2>
    <p>This is a paragraph demonstrating <b>bold</b>, <i>italic</i>, and <u>underline</u>.</p>
    <a href="https://www.google.com" target="_blank">Go to Google</a>
    <br><br>
    <img src="https://via.placeholder.com/150" alt="Sample Image" width="150" height="150">
    <h3>My Skills</h3>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
    <h3>Student Table</h3>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Venky</td>
            <td>22</td>
        </tr>
    </table>

    <h3>Contact Form</h3>
    <form>
        <label>Name:</label>
        <input type="text" placeholder="Enter name"><br><br>

        <label>Email:</label>
        <input type="email" required><br><br>

        <label>Password:</label>
        <input type="password"><br><br>

        <input type="submit" value="Submit">
    </form>

    <div class="box">
        <p>This is inside a div</p>
        <span style="color:red;">This is a span element</span>
    </div>
    <button onclick="alert('Hello Venky!')">Click Me</button>

</body>
</html>
